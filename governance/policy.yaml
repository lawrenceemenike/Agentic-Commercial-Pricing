apiVersion: governance.toolkit/v1
name: pricing-terminal-production-policy
default_action: deny
rules:
  - name: allow-read-market-data
    condition: "action.tool_name == 'extract_category_context'"
    action: allow
    description: "Agent is permitted to read historical market data from the CSV."

  - name: govern-xgboost-simulation
    condition: "action.tool_name == 'run_xgboost_optimization_tool'"
    action: allow
    description: "Agent is permitted to run pricing simulations via XGBoost."

  - name: block-destructive-operations
    condition: "action.type in ['delete', 'drop', 'write', 'network_request']"
    action: deny
    description: "The agent is strictly prohibited from altering local files or making external network calls."
